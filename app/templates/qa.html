{% extends "base.html" %}
{% block title %}知识问答{% endblock %}
{% block nav_qa %}active{% endblock %}

{% block head %}
<style>
.qa-page {
  max-width: 840px;
  margin: 0 auto;
  padding: 0 32px;
  display: flex;
  flex-direction: column;
  min-height: calc(100vh - var(--nav-height) - 120px);
}

.qa-header {
  text-align: center;
  padding: 48px 0 24px;
}

/* Chat area */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 16px 0;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.chat-welcome {
  text-align: center;
  padding: 48px 0;
  color: var(--text-muted);
}

.chat-welcome-icon {
  font-size: 3rem;
  margin-bottom: 16px;
  opacity: 0.3;
}

.chat-welcome-examples {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-top: 24px;
}

.chat-example-btn {
  padding: 8px 18px;
  border-radius: var(--radius-sm);
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  color: var(--text-secondary);
  font-size: 0.87rem;
  cursor: pointer;
  transition: all var(--transition);
  font-family: var(--font-sans);
}

.chat-example-btn:hover {
  border-color: var(--accent-red);
  color: var(--accent-red);
}

/* Chat message */
.chat-msg {
  display: flex;
  gap: 12px;
  animation: fadeSlideUp 0.3s ease both;
}

.chat-msg.user { flex-direction: row-reverse; }

.chat-avatar {
  width: 36px; height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 0.85rem;
  font-weight: 700;
  font-family: var(--font-serif);
}

.chat-msg.user .chat-avatar {
  background: linear-gradient(135deg, var(--accent-red), var(--accent-red-dark));
  color: #fff;
}

.chat-msg.ai .chat-avatar {
  background: rgba(196,30,58,0.08);
  color: var(--accent-red);
  border: 1px solid rgba(196,30,58,0.15);
}

.chat-body {
  max-width: 80%;
}

.chat-msg.user .chat-body { text-align: right; }

.chat-content {
  padding: 14px 18px;
  border-radius: var(--radius-md);
  line-height: 1.7;
  font-size: 0.95rem;
}

.chat-msg.user .chat-content {
  background: linear-gradient(135deg, var(--accent-red), var(--accent-red-dark));
  color: #fff;
  border-bottom-right-radius: 4px;
}

.chat-msg.ai .chat-content {
  background: var(--bg-surface);
  border: 1px solid var(--border-gold);
  border-bottom-left-radius: 4px;
}

.chat-meta {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-top: 6px;
  padding: 0 4px;
}

/* References */
.chat-references {
  margin-top: 10px;
  border-top: 1px solid var(--border-subtle);
  padding-top: 10px;
}

.chat-references summary {
  cursor: pointer;
  font-size: 0.82rem;
  color: var(--accent-gold);
  font-weight: 500;
  user-select: none;
}

.chat-references summary:hover { text-decoration: underline; }

.ref-list {
  margin-top: 8px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.ref-item {
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  background: rgba(196,163,90,0.04);
  border: 1px solid rgba(196,163,90,0.1);
  font-size: 0.8rem;
  line-height: 1.5;
}

.ref-item .ref-meta {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 4px;
}

.ref-item .ref-score {
  color: var(--accent-gold);
  font-weight: 600;
  font-family: var(--font-mono);
  font-size: 0.75rem;
}

.ref-item .ref-source {
  color: var(--text-muted);
  font-size: 0.75rem;
}

.ref-item .ref-text {
  color: var(--text-secondary);
}

/* Typing indicator */
.typing-dots {
  display: inline-flex;
  gap: 4px;
  padding: 4px 0;
}

.typing-dots span {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent-gold);
  animation: typingBounce 1.4s ease-in-out infinite;
}

.typing-dots span:nth-child(2) { animation-delay: 0.16s; }
.typing-dots span:nth-child(3) { animation-delay: 0.32s; }

@keyframes typingBounce {
  0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}

/* Input area */
.qa-input-area {
  padding: 20px 0 32px;
  border-top: 1px solid var(--border-subtle);
  display: flex;
  gap: 12px;
  align-items: flex-end;
}

.qa-input-wrap {
  flex: 1;
  position: relative;
}

.qa-input-wrap textarea {
  width: 100%;
  padding: 14px 16px;
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 0.95rem;
  resize: none;
  min-height: 52px;
  max-height: 150px;
  line-height: 1.5;
  transition: border-color var(--transition);
}

.qa-input-wrap textarea:focus {
  outline: none;
  border-color: var(--accent-gold);
}

.qa-input-wrap textarea::placeholder { color: var(--text-muted); }

.btn-send {
  width: 52px; height: 52px;
  border-radius: var(--radius-md);
  flex-shrink: 0;
}
</style>
{% endblock %}

{% block content %}
<div class="qa-page">
  <div class="qa-header">
    <h1>戏曲<span class="text-gold">知识</span>问答</h1>
    <p class="text-muted">RAG 知识库增强 + 千问大模型，提供有据可查的专业回答</p>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="chat-welcome" id="chatWelcome">
      <div class="chat-welcome-icon">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.4">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <p>提出你的戏曲问题，AI 将结合专业知识库为你解答</p>
      <div class="chat-welcome-examples">
        <button class="chat-example-btn" data-q="西皮和二黄有什么区别？">西皮和二黄有什么区别？</button>
        <button class="chat-example-btn" data-q="什么是起霸？">什么是起霸？</button>
        <button class="chat-example-btn" data-q="梆子戏有哪些代表剧目？">梆子戏有哪些代表剧目？</button>
        <button class="chat-example-btn" data-q="京剧的四大行当分别是什么？">京剧四大行当是什么？</button>
      </div>
    </div>
  </div>

  <div class="qa-input-area">
    <div class="qa-input-wrap">
      <textarea id="qaInput" placeholder="请输入你的戏曲相关问题..." rows="1"></textarea>
    </div>
    <button class="btn btn-primary btn-send" id="btnSend" title="发送">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
  const chatArea    = document.getElementById('chatArea');
  const chatWelcome = document.getElementById('chatWelcome');
  const qaInput     = document.getElementById('qaInput');
  const btnSend     = document.getElementById('btnSend');
  let sending = false;

  /* Auto-resize textarea */
  qaInput.addEventListener('input', () => {
    qaInput.style.height = 'auto';
    qaInput.style.height = Math.min(qaInput.scrollHeight, 150) + 'px';
  });

  /* Example buttons */
  document.querySelectorAll('.chat-example-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      qaInput.value = btn.dataset.q;
      sendQuestion();
    });
  });

  /* Enter to send (Shift+Enter for newline) */
  qaInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendQuestion();
    }
  });

  btnSend.addEventListener('click', sendQuestion);

  function addMessage(role, content, refs) {
    if (chatWelcome) chatWelcome.remove();
    const msg = document.createElement('div');
    msg.className = 'chat-msg ' + role;

    const avatarText = role === 'user' ? '问' : '梨';
    let refsHtml = '';
    if (refs && refs.length > 0) {
      const items = refs.map(r => `
        <div class="ref-item">
          <div class="ref-meta">
            <span class="ref-score">${(r.score * 100).toFixed(1)}%</span>
            <span class="ref-source">${r.title || '未知'} · ${r.genre || ''}</span>
          </div>
          <div class="ref-text">${r.text.length > 120 ? r.text.slice(0, 120) + '...' : r.text}</div>
        </div>
      `).join('');
      refsHtml = `
        <div class="chat-references">
          <details>
            <summary>知识来源 (${refs.length} 条参考)</summary>
            <div class="ref-list">${items}</div>
          </details>
        </div>
      `;
    }

    msg.innerHTML = `
      <div class="chat-avatar">${avatarText}</div>
      <div class="chat-body">
        <div class="chat-content">${content}${refsHtml}</div>
        <div class="chat-meta">${role === 'ai' ? 'AI 回答' : ''}</div>
      </div>
    `;
    chatArea.appendChild(msg);
    chatArea.scrollTop = chatArea.scrollHeight;
    return msg;
  }

  function addTypingIndicator() {
    if (chatWelcome) chatWelcome.remove();
    const msg = document.createElement('div');
    msg.className = 'chat-msg ai';
    msg.id = 'typingIndicator';
    msg.innerHTML = `
      <div class="chat-avatar">梨</div>
      <div class="chat-body">
        <div class="chat-content">
          <div class="typing-dots"><span></span><span></span><span></span></div>
        </div>
      </div>
    `;
    chatArea.appendChild(msg);
    chatArea.scrollTop = chatArea.scrollHeight;
    return msg;
  }

  function removeTypingIndicator() {
    const el = document.getElementById('typingIndicator');
    if (el) el.remove();
  }

  async function sendQuestion() {
    const question = qaInput.value.trim();
    if (!question || sending) return;
    sending = true;

    addMessage('user', question);
    qaInput.value = '';
    qaInput.style.height = 'auto';
    btnSend.disabled = true;

    addTypingIndicator();

    try {
      const data = await API.qa(question);
      removeTypingIndicator();
      const answer = (data.answer || '无法获取回答').replace(/\*\*/g, '');
      const source = data.source === 'rag' ? ' · 基于知识库' : ' · 通用生成';
      const refs = data.references || [];

      const msg = addMessage('ai', answer.replace(/\n/g, '<br>'), refs);
      const meta = msg.querySelector('.chat-meta');
      if (meta) meta.textContent = 'AI 回答' + source;
    } catch (e) {
      removeTypingIndicator();
      addMessage('ai', '抱歉，回答失败: ' + e.message);
    } finally {
      sending = false;
      btnSend.disabled = false;
      qaInput.focus();
    }
  }
})();
</script>
{% endblock %}
