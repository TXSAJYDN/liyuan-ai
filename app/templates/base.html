<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}梨园知见{% endblock %} - 融合视觉语义检索与知识增强生成的戏曲视频智能解析平台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
  {% block head %}{% endblock %}
</head>
<body>
  <!-- 导航栏 -->
  <nav class="nav" id="mainNav">
    <div class="nav-inner container">
      <a href="/" class="nav-brand">
        <span class="nav-logo">梨</span>
        <span class="nav-title">梨园知见</span>
      </a>
      <div class="nav-links">
        <a href="/" class="nav-link {% block nav_home %}{% endblock %}">首页</a>
        <a href="/analyze" class="nav-link {% block nav_analyze %}{% endblock %}">视频分析</a>
        <a href="/search" class="nav-link {% block nav_search %}{% endblock %}">按义寻画</a>
        <a href="/qa" class="nav-link {% block nav_qa %}{% endblock %}">知识问答</a>
      </div>
      <button class="nav-toggle" id="navToggle" aria-label="菜单">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- 主内容 -->
  <main class="main">
    {% block content %}{% endblock %}
  </main>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="container">
      <div class="footer-inner">
        <div class="footer-brand">
          <span class="footer-logo">梨</span>
          <span>梨园知见 &middot; 融合视觉语义检索与知识增强生成的戏曲视频智能解析平台</span>
        </div>
        <div class="footer-tech">
          <span class="tech-tag">Qwen3-Omni</span>
          <span class="tech-tag">OpenCLIP</span>
          <span class="tech-tag">FAISS</span>
          <span class="tech-tag">FastAPI</span>
          <span class="tech-tag">RAG</span>
        </div>
      </div>
    </div>
  </footer>

  <!-- 全局 loading 遮罩 -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner">
      <div class="spinner-ring"></div>
      <div class="spinner-text">处理中</div>
    </div>
  </div>

  <script src="/static/js/main.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
