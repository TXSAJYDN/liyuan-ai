  <line x1="30" y1="45" x2="100" y2="175" stroke="#8b6914" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="170" y1="45" x2="100" y2="175" stroke="#8b6914" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Decorative ink painting on fan - simple landscape -->
  <path d="M55,80 Q65,55 75,75 Q82,60 92,72" fill="none" stroke="#2a5a2a" stroke-width="1.5" opacity="0.5"/>
  <path d="M108,68 Q118,48 128,65 Q135,55 142,70" fill="none" stroke="#2a5a2a" stroke-width="1.5" opacity="0.5"/>
  <!-- Small plum blossom decorations -->
  <circle cx="80" cy="95" r="3" fill="#c41e3a" opacity="0.6"/>
  <circle cx="88" cy="90" r="2.5" fill="#c41e3a" opacity="0.5"/>
  <circle cx="85" cy="100" r="2" fill="#c41e3a" opacity="0.4"/>
  <circle cx="115" cy="88" r="3" fill="#c41e3a" opacity="0.6"/>
  <circle cx="122" cy="93" r="2.5" fill="#c41e3a" opacity="0.5"/>
  <!-- Pivot point -->
  <circle cx="100" cy="175" r="4" fill="#8b6914" stroke="#5a4510" stroke-width="1.5"/>
  <!-- Caption -->
  <text x="100" y="212" text-anchor="middle" font-family="serif" font-size="14" fill="#8b1a1a">按义寻画 · 语义检索</text>
