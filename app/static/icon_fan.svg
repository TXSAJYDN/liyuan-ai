<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <!-- Fan ribs (radiating lines) -->
  <g stroke="#8b6914" stroke-width="1.5" fill="none">
    <line x1="100" y1="175" x2="30" y2="45"/>
    <line x1="100" y1="175" x2="45" y2="35"/>
    <line x1="100" y1="175" x2="62" y2="28"/>
    <line x1="100" y1="175" x2="80" y2="24"/>
    <line x1="100" y1="175" x2="100" y2="22"/>
    <line x1="100" y1="175" x2="120" y2="24"/>
    <line x1="100" y1="175" x2="138" y2="28"/>
    <line x1="100" y1="175" x2="155" y2="35"/>
    <line x1="100" y1="175" x2="170" y2="45"/>
  </g>
  <!-- Fan surface -->
  <path d="M30,45 Q50,18 100,22 Q150,18 170,45 Q145,30 100,25 Q55,30 30,45Z" fill="#fdf6f0" stroke="#c41e3a" stroke-width="1" opacity="0.6"/>
  <path d="M30,45 Q65,15 100,22 Q135,15 170,45 L100,175Z" fill="#fdf6f0" fill-opacity="0.85" stroke="none"/>
