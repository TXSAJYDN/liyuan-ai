  <path d="M42,72 Q68,55 92,72" fill="none" stroke="#c41e3a" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M108,72 Q132,55 158,72" fill="none" stroke="#c41e3a" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Nose -->
