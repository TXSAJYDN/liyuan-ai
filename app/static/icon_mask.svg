  <path d="M78,140 Q100,152 122,140" fill="#c41e3a" stroke="#8b0000" stroke-width="1.5"/>
  <!-- Cheek patterns -->
  <path d="M38,90 Q48,108 42,132" fill="none" stroke="#c41e3a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M162,90 Q152,108 158,132" fill="none" stroke="#c41e3a" stroke-width="2.5" stroke-linecap="round"/>
